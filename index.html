<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website Maintenance</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Poppins',sans-serif;
color:white;
}

/* neon glow */

.wrapper{

padding:3px;
border-radius:20px;

box-shadow:
0 0 10px #00ffff,
0 0 20px #00ffff,
0 0 40px #00ffff;

animation:neon 3s linear infinite;

}

@keyframes neon{

0%{filter:hue-rotate(0deg)}
100%{filter:hue-rotate(360deg)}

}

/* card */

.card{

width:420px;
padding:40px;

background:rgba(120,120,120,0.15);

backdrop-filter:blur(12px);

border-radius:20px;

border:1px solid rgba(255,255,255,0.1);

text-align:center;

}

/* title */

h1{

font-family:'Orbitron',sans-serif;

letter-spacing:2px;

margin-bottom:10px;

}

/* desc */

.desc{

color:#ccc;

margin-bottom:20px;

}

/* status */

.status{

padding:8px;

border-radius:10px;

background:rgba(255,255,255,0.08);

margin-bottom:20px;

}

/* mood text */

.mood{

margin-bottom:20px;
color:#ddd;

}

/* loading */

.loading{

width:100%;
height:8px;

background:rgba(255,255,255,0.1);

border-radius:20px;

overflow:hidden;

margin-bottom:25px;

}

.loading-bar{

height:100%;
width:0%;

background:#aaa;

animation:loading 4s linear infinite;

}

@keyframes loading{

0%{width:0%}

50%{width:80%}

100%{width:100%}

}

/* button */

.btn{

background:#ddd;

color:black;

border:none;

padding:12px 25px;

border-radius:40px;

cursor:pointer;

}

/* floating wa */

.wa{

position:fixed;

bottom:25px;

right:25px;

width:60px;
height:60px;

background:#ddd;
color:black;

border-radius:50%;

display:flex;

align-items:center;
justify-content:center;

font-size:28px;

cursor:pointer;

}

</style>
</head>

<body>

<div class="wrapper">

<div class="card">

<h1>WEBSITE MAINTENANCE</h1>

<div class="desc">
Website sedang diperbaiki oleh admin
</div>

<div class="status" id="status">
STATUS SERVER : MAINTENANCE
</div>

<div class="mood">
⏳ Menunggu admin mood kembali...
</div>

<div class="loading">
<div class="loading-bar"></div>
</div>

<button class="btn" onclick="wa()">Hubungi WhatsApp</button>

</div>

</div>

<div class="wa" onclick="wa()">💬</div>

<audio id="music" loop>
<source src="https://a.top4top.io/m_36422w8vj0.mp3">
</audio>

<script>

/* play music after click */

document.body.addEventListener("click",function(){

document.getElementById("music").play()

},{once:true})

/* whatsapp */

function wa(){

let nomor="6287729805594"

let pesan="Halo admin, website nya kapan selesai maintenance?"

window.open("https://wa.me/"+nomor+"?text="+encodeURIComponent(pesan))

}

/* server status */

function status(){

let s=[
"MAINTENANCE",
"ADMIN LAGI NGOPI ☕",
"ADMIN LAGI TIDUR 😴",
"SERVER DI SERVICE 🔧"
]

let r=s[Math.floor(Math.random()*s.length)]

document.getElementById("status").innerHTML="STATUS SERVER : "+r

}

setInterval(status,6000)

</script>

</body>
</html>
